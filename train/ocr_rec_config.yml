# PaddleOCR 车牌识别模型微调配置
# 基于 PP-OCRv4 (SVTR_LCNet) 架构
# 用法: python tools/train.py -c train/ocr_rec_config.yml

Global:
  use_gpu: true
  epoch_num: 60
  log_smooth_window: 20
  print_batch_step: 20
  save_model_dir: ./output/plate_rec
  save_epoch_step: 5
  eval_batch_step: [0, 500]
  cal_metric_during_train: true
  pretrained_model: https://paddleocr.bj.bcebos.com/PP-OCRv4/chinese/ch_PP-OCRv4_rec_train.tar
  checkpoints: null
  save_inference_dir: ./output/plate_rec_infer
  use_visualdl: false
  infer_img: null
  character_dict_path: dataset/ocr_rec/plate_dict.txt
  max_text_length: 9
  infer_mode: false
  use_space_char: false
  distributed: false

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005
    warmup_epoch: 3
  regularizer:
    name: L2
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform: null
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - SARHead:
          enc_dim: 120
          max_text_length: 9

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss: null
    - SARLoss: null

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: MultiScaleDataSet
    data_dir: ./dataset/ocr_rec
    ext_op_transform_idx: 1
    label_file_list:
      - ./dataset/ocr_rec/train.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecConAug:
          prob: 0.5
          ext_data_num: 2
          image_shape: [48, 320, 3]
          max_text_length: 9
      - RecAug: null
      - MultiLabelEncode: null
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_sar
            - length
            - valid_ratio
  loader:
    shuffle: true
    batch_size_per_card: 128
    drop_last: true
    num_workers: 8

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./dataset/ocr_rec
    label_file_list:
      - ./dataset/ocr_rec/val.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode: null
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_sar
            - length
            - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 128
    num_workers: 8
